else
  read -p "  Enter value (leave empty to generate): " VALUE
  if [ -z "$VALUE" ]; then
    VALUE=$(openssl rand -hex 32)
    echo "  Generated: $VALUE"
  fi
fi
if [ -n "$VALUE" ]; then
  echo "$VALUE" | pnpm exec wrangler secret put BETTER_AUTH_SECRET --name="$WORKER"
  echo "  ✓ BETTER_AUTH_SECRET set"
fi

