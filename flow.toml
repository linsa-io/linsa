[[tasks]]
name = "migrate-safe"
interactive = true
command = """
set -euo pipefail

ROOT="$(pwd)"
WEB_DIR="$ROOT/packages/web"
ENV_FILE="$WEB_DIR/.env"

echo "=== Safe Production Migration ==="
echo ""

if [ ! -f "$ENV_FILE" ]; then
  echo "Missing $ENV_FILE. Run 'f setup' first."
  exit 1
fi

set -a
. "$ENV_FILE"
set +a

PROD_URL="${PROD_DATABASE_URL:-}"

