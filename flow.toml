# ELECTRIC_URL
set_secret "ELECTRIC_URL" "https://api.electric-sql.cloud" "false"

# OPENROUTER_API_KEY
set_secret "OPENROUTER_API_KEY" "" "false"

echo ""
echo "=== Done ==="
echo "Secrets are set. Run 'pnpm deploy:web' or push to git to deploy."
